kind = "web"
previewPath = "/"
title = "Excel Email Extractor"
version = "1.0.0"
id = "artifacts/excel-email-extractor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22730

[services.development]
run = "pnpm --filter @workspace/excel-email-extractor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/excel-email-extractor", "run", "build" ]
publicDir = "artifacts/excel-email-extractor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22730"
BASE_PATH = "/"
